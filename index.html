<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juice Cost Calculator Pro</title>

<style>

body{
margin:0;
padding:10px;
font-family:Arial;
background:#f1f1f1;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:white;
padding:12px;
border-radius:12px;
margin-bottom:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

h1{
text-align:center;
font-size:24px;
margin-bottom:10px;
}

select,input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:10px;
font-size:16px;
border-radius:8px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#008cff;
color:white;
border:none;
border-radius:10px;
font-size:16px;
margin-top:5px;
}

button:active{
transform:scale(0.98);
}

.ingredientRow{
display:grid;
grid-template-columns:1fr 80px 80px 60px;
gap:5px;
margin-bottom:5px;
}

.result{
font-size:18px;
font-weight:bold;
margin-top:8px;
color:green;
}

.small{
font-size:13px;
color:#666;
}

</style>
</head>

<body>

<div class="container">

<h1>🥤 Juice Cost Calculator Pro</h1>

<div class="card">

<label>Recipe Name</label>
<select id="recipeList"></select>

<input type="text" id="recipeName" placeholder="नई recipe का नाम">

<button onclick="saveRecipe()">💾 Save Recipe</button>

</div>

<div class="card">

<label>Base Glass</label>

<select id="baseGlass" onchange="tick();calculate()"></select>

<label>Target Glass</label>

<select id="targetGlass" onchange="tick();calculate()"></select>

<label>Selling Price Per Glass ₹</label>

<select id="sellPrice" onchange="tick();calculate()"></select>

</div>

<div class="card">

<h3>Ingredients</h3>

<div id="ingredients"></div>

<button onclick="addIngredient()">➕ Add Ingredient</button>

</div>

<div class="card">

<div class="result" id="totalCost">Total Cost: ₹0</div>

<div class="result" id="costPerGlass">Cost Per Glass: ₹0</div>

<div class="result" id="profit">Profit: ₹0</div>

</div>

</div>

<script>

const ingredientBox = document.getElementById("ingredients");

function fillSelect(id,max){
let select=document.getElementById(id);

for(let i=1;i<=max;i++){

let option=document.createElement("option");
option.value=i;
option.text=i;
select.appendChild(option);

}
}

fillSelect("baseGlass",200);
fillSelect("targetGlass",500);
fillSelect("sellPrice",500);

document.getElementById("baseGlass").value=1;
document.getElementById("targetGlass").value=1;
document.getElementById("sellPrice").value=30;

function tick(){

navigator.vibrate(20);

let audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
audio.play();

}

function addIngredient(name="",qty=1,price=100){

let row=document.createElement("div");
row.className="ingredientRow";

row.innerHTML=`

<input placeholder="Ingredient" value="${name}" class="name">

<select class="qty"></select>

<select class="price"></select>

<button onclick="removeIngredient(this)">❌</button>

`;

ingredientBox.appendChild(row);

let qtySelect=row.querySelector(".qty");
let priceSelect=row.querySelector(".price");

for(let i=1;i<=5000;i++){

let op1=document.createElement("option");
op1.value=i;
op1.text=i+"g";
qtySelect.appendChild(op1);

let op2=document.createElement("option");
op2.value=i;
op2.text="₹"+i;
priceSelect.appendChild(op2);

}

qtySelect.value=qty;
priceSelect.value=price;

qtySelect.onchange=()=>{tick();calculate();}
priceSelect.onchange=()=>{tick();calculate();}

calculate();

}

function removeIngredient(btn){

btn.parentElement.remove();
calculate();

}

function calculate(){

let baseGlass=Number(document.getElementById("baseGlass").value);

let targetGlass=Number(document.getElementById("targetGlass").value);

let sellPrice=Number(document.getElementById("sellPrice").value);

let rows=document.querySelectorAll(".ingredientRow");

let total=0;

rows.forEach(row=>{

let qty=Number(row.querySelector(".qty").value);

let price=Number(row.querySelector(".price").value);

let cost=(qty/1000)*price;

total+=cost;

});

let finalCost=(total/baseGlass)*targetGlass;

let perGlass=finalCost/targetGlass;

let totalSell=sellPrice*targetGlass;

let profit=totalSell-finalCost;

document.getElementById("totalCost").innerHTML=
"Total Cost: ₹"+finalCost.toFixed(2);

document.getElementById("costPerGlass").innerHTML=
"Cost Per Glass: ₹"+perGlass.toFixed(2);

document.getElementById("profit").innerHTML=
"Profit: ₹"+profit.toFixed(2);

}

function saveRecipe(){

let recipeName=document.getElementById("recipeName").value;

if(recipeName==""){
alert("Recipe name डालो");
return;
}

let rows=document.querySelectorAll(".ingredientRow");

let ingredients=[];

rows.forEach(row=>{

ingredients.push({

name:row.querySelector(".name").value,
qty:row.querySelector(".qty").value,
price:row.querySelector(".price").value

});

});

let data={

baseGlass:document.getElementById("baseGlass").value,
targetGlass:document.getElementById("targetGlass").value,
sellPrice:document.getElementById("sellPrice").value,
ingredients:ingredients

};

localStorage.setItem(recipeName,JSON.stringify(data));

loadRecipes();

alert("Recipe Saved");

}

function loadRecipes(){

let recipeList=document.getElementById("recipeList");

recipeList.innerHTML="";

for(let i=0;i<localStorage.length;i++){

let key=localStorage.key(i);

let option=document.createElement("option");

option.value=key;
option.text=key;

recipeList.appendChild(option);

}

}

document.getElementById("recipeList").onchange=function(){

let data=JSON.parse(localStorage.getItem(this.value));

document.getElementById("baseGlass").value=data.baseGlass;
document.getElementById("targetGlass").value=data.targetGlass;
document.getElementById("sellPrice").value=data.sellPrice;

ingredientBox.innerHTML="";

data.ingredients.forEach(item=>{

addIngredient(item.name,item.qty,item.price);

});

calculate();

};

addIngredient("बादाम",5,800);
addIngredient("सौंफ",2,500);
addIngredient("इलायची",1,4000);

loadRecipes();

calculate();

</script>

</body>
</html>
